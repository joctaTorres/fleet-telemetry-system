# Batch manifest — declarative intent for a multi-change effort.
#
# A batch coordinates related changes across ordered phases. It references
# changes by NAME and never owns them: changes live under .ratchet/changes/
# like any other change and can be inspected, validated, and archived on their
# own. Status is derived live from change state on disk — never stored here.
#
# Phases ship functional software behind an executable proof-of-work, so errors
# surface early. A later phase is blocked until the prior phase's proof-of-work
# passes. Changes are created lazily as the batch progresses: an entry with no
# change directory yet is simply "pending", not an error.
#
# Architecture of record: docs/ADR.md (ADR-0001). CDC-over-WAL → Redis → WS,
# primary/replica split, two APIs. Infra is introduced LAZILY: phases 1–4 run
# against a single Postgres and are exercised end-to-end over REST; the read
# replica + CDC consumer + Redis arrive in phase 5 where the WebSocket path
# actually needs them. Proofs assume Docker Compose / testcontainers, so the
# concurrency-correctness claims are tested against a real Postgres.

name: fleet-telemetry-service
created: 2026-06-16

phases:
  # ── PHASE 1 ────────────────────────────────────────────────────────────────
  # Concrete proof + decomposed change intents (this phase is built first).
  - name: ingest-and-fleet-state
    goal: >
      A vehicle (HTTP client) can POST a telemetry event to the stateless
      ingestion API, have it validated and persisted to Postgres, and read the
      current aggregate fleet state (per-status counts) back over REST. Single
      Postgres; no replica/CDC/Redis yet.
    success: >
      POST /telemetry validates the event schema and upserts the vehicle's
      current state plus appends the raw event. GET /fleet/state returns
      per-status counts (idle|moving|charging|fault) across all distinct
      vehicles, computed by GROUP BY over vehicle_current_state, internally
      consistent under MVCC and safe under concurrent writes.
    proofOfWork:
      kind: integration
      run: docker compose -f docker-compose.test.yml run --rm api pytest tests/integration/test_ingest_fleet_state.py
      pass: >
        exit code 0 — test concurrently POSTs telemetry for 50 distinct
        vehicles across mixed statuses, then asserts GET /fleet/state returns
        per-status counts that sum to 50 and exactly match the last event per
        vehicle (no lost or double-counted upserts).
    changes:
      - name: telemetry-persistence
        # Root: Postgres schema (raw_events, vehicle_current_state) + the
        # idempotent upsert write path (INSERT ... ON CONFLICT DO UPDATE).
      - name: ingestion-post-endpoint
        # Stateless POST /telemetry: validate payload → call persistence.
        after: [telemetry-persistence]
      - name: fleet-state-endpoint
        # GET /fleet/state: SELECT status, COUNT(*) ... GROUP BY status.
        after: [telemetry-persistence]

  # ── PHASE 2 ────────────────────────────────────────────────────────────────
  # Described proof (kind fixed now; exact command refined at phase entry).
  - name: zone-traversal-counter
    goal: >
      When a telemetry event carries a non-null zone_entered, that zone's
      entry_count is incremented atomically so that under a burst of concurrent
      entries to the same zone (shift-change convergence) every entry is
      counted. Per-zone counts are exposed at GET /zones/counts. ~20 zones are a
      hardcoded startup constant.
    success: >
      Increments use a single server-side UPDATE ... SET entry_count =
      entry_count + 1 WHERE zone_id = $1 (row-locked read-modify-write inside
      Postgres); the rejected application-level SELECT-then-UPDATE is NOT used.
      GET /zones/counts returns the live per-zone totals.
    proofOfWork:
      kind: integration
      run: docker compose -f docker-compose.test.yml run --rm api pytest tests/integration/test_zone_counts.py
      pass: >
        exit code 0 — after firing N concurrent zone_entered events for one
        zone, that zone's entry_count equals exactly N (zero lost increments);
        events with zone_entered=null leave all counts unchanged; GET
        /zones/counts returns all ~20 seeded zones.
    # Decomposed at phase entry (2026-06-16) from phase-1's real shape: a
    # persistence root that adds zone_counts + the atomic increment in the
    # existing persist_telemetry path, then a read endpoint on the frontend API.
    changes:
      - name: zone-counts-increment
        # Root: migration for zone_counts (PK zone_id, entry_count), seed the
        # ~20-zone hardcoded constant, and wire the atomic
        # UPDATE ... SET entry_count = entry_count + 1 WHERE zone_id = $1 into
        # persist_telemetry when zone_entered is non-null (same transaction).
      - name: zone-counts-endpoint
        # GET /zones/counts on the existing frontend API: live per-zone totals.
        after: [zone-counts-increment]

  # ── PHASE 3 ────────────────────────────────────────────────────────────────
  - name: anomaly-detection-and-query
    goal: >
      Anomalies are detected synchronously inside the ingest transaction and
      written to an anomalies table; recent anomalies are queryable over REST,
      filtered by vehicle and time range.
    success: >
      Detection covers the agreed default rules — stateless: status=fault,
      non-empty error_codes, battery_pct<15 while status!=charging, speed_mps>5;
      stateful (vs the previous persisted reading): stuck (status=moving &
      speed<0.1 for ≥10s), teleport (implied speed >15 m/s between consecutive
      events), battery rising while not charging; by-absence watchdog: no event
      from a vehicle for >5s = comms loss. GET /anomalies filters by vehicle_id
      and a [since, until] time range as an indexed read.
    proofOfWork:
      kind: integration
      run: docker compose -f docker-compose.test.yml run --rm api pytest tests/integration/test_anomalies.py
      pass: >
        exit code 0 — each default anomaly class fires exactly when its
        threshold is crossed and not otherwise (including a comms-loss gap);
        GET /anomalies returns the matching rows for a given vehicle within the
        requested [since, until] window and excludes those outside it.
    # Decomposed at phase entry (2026-06-16) from the real shape: a detection
    # root that adds the anomalies table + synchronous checks in the existing
    # persist_telemetry path, then a read endpoint and the background watchdog
    # fanning out off the root.
    changes:
      - name: anomaly-detection
        # Root: migration for anomalies table; synchronous stateless + stateful
        # checks inside persist_telemetry (stateful uses the prior
        # vehicle_current_state reading); the anomalies INSERT is the event.
      - name: anomaly-query-endpoint
        # GET /anomalies on the frontend API: indexed read filtered by
        # vehicle_id and a [since, until] time range.
        after: [anomaly-detection]
      - name: comms-loss-watchdog
        # Background by-absence detector: no event from a vehicle for >5s writes
        # a comms-loss anomaly to the same table.
        after: [anomaly-detection]

  # ── PHASE 4 ────────────────────────────────────────────────────────────────
  - name: fault-transition
    goal: >
      A vehicle status-update operation that, on transition to fault, atomically
      cancels the vehicle's active mission and creates a maintenance record —
      correct under concurrent and at-least-once delivery.
    success: >
      The transition runs as one transaction holding SELECT 1 FROM vehicles
      WHERE vehicle_id=$1 FOR UPDATE, then cancels the active mission, inserts a
      maintenance record, and sets status=fault. Idempotent via a transition
      guard plus a uniqueness constraint, so concurrent/duplicate fault events
      cannot double-cancel or create duplicate maintenance records.
    proofOfWork:
      kind: integration
      run: docker compose -f docker-compose.test.yml run --rm api pytest tests/integration/test_fault_transition.py
      pass: >
        exit code 0 — after concurrent and duplicate fault transitions for the
        same vehicle, exactly one mission is cancelled and exactly one
        maintenance record exists; the vehicle ends in status=fault.
    # Decomposed at phase entry (2026-06-16): a core root that adds the
    # missions + maintenance_records tables and the FOR UPDATE-locked,
    # idempotent fault handler (proven at the persistence layer under
    # concurrency), then the HTTP status-update operation that exposes it.
    changes:
      - name: fault-transition-core
        # Root: migrations for missions + maintenance_records (+ uniqueness
        # constraint for idempotency); transactional handler holding
        # SELECT ... FOR UPDATE on the vehicle row that cancels the active
        # mission, inserts the maintenance record, and sets status=fault —
        # guarded so concurrent/duplicate transitions can't double-apply.
      - name: status-update-endpoint
        # Vehicle status-update operation (HTTP) that invokes the fault handler
        # on transition to fault; lands the phase proof test_fault_transition.py.
        after: [fault-transition-core]

  # ── PHASE 5 ────────────────────────────────────────────────────────────────
  # Infra arrives here: read replica + CDC consumer + Redis + frontend API.
  - name: realtime-cdc-websocket
    goal: >
      Committed changes propagate to a frontend API and out over WebSocket with
      sub-second latency, derived from the WAL (no dual-write). Introduces the
      read replica, the singleton CDC consumer tailing the logical slot, Redis
      pub/sub fan-out, and the stateful frontend API (REST snapshot on connect,
      then WS deltas).
    success: >
      The CDC consumer translates the three watched tables into
      vehicle_state_changed, anomaly_detected, and zone_count_changed events,
      publishes to Redis; a frontend API instance serves a one-shot REST
      snapshot from the replica on connect and then streams individual state
      patches over WebSocket. The ingestion API never touches Redis.
    proofOfWork:
      kind: blackbox
      run: docker compose -f docker-compose.test.yml run --rm api pytest tests/integration/test_realtime_ws.py
      pass: >
        exit code 0 — after POSTing a fault/zone-entry to the ingestion API, a
        connected WebSocket client receives the corresponding state-patch event
        (vehicle_state_changed / anomaly_detected / zone_count_changed) within a
        sub-second bound, with no event emitted for an uncommitted write.
    # Decomposed at phase entry (2026-06-16); cdc-consumer RE-SPLIT (2026-06-16)
    # after it overran the 10-min apply window: the single CDC change is now two
    # slices, each sized to fit the window, and the decode plugin is pgoutput
    # (built-in binary logical-replication output) rather than test_decoding.
    changes:
      - name: websocket-fanout
        # Root (done): Redis + stateful frontend API — async @app.websocket
        # endpoint, connection registry, REST snapshot on connect, async Redis
        # subscriber fanning published state patches to connected clients.
      - name: read-replica-split
        # Streaming physical replica; frontend REST snapshot (fleet/zones/
        # anomalies) served from the replica via a replica connection pool.
        # Rewrites the shared files that the discarded cdc work scaffolded
        # (db.py pool, persistence read-seam, frontend snapshot, compose, conftest).
        # Proof: write to primary, snapshot reflects it from the replica.
        after: [websocket-fanout]
      - name: cdc-pgoutput-translate
        # Singleton CDC consumer tailing the primary's logical slot via PGOUTPUT:
        # CREATE PUBLICATION for vehicle_current_state / anomalies / zone_counts,
        # slot with pgoutput + replication protocol, decode the binary
        # Relation/Insert/Update messages into vehicle_state_changed /
        # anomaly_detected / zone_count_changed, publish to Redis. Ingestion
        # never touches Redis. Proof is FAST and isolates the risky decode:
        # write to the primary, assert the correct event JSON lands on the Redis
        # channel (no replica/WS needed).
        after: [read-replica-split]
      - name: cdc-end-to-end-ws
        # Wire the consumer into the running topology; lands the full phase
        # blackbox proof (test_realtime_ws.py): POST to ingestion -> WS client
        # receives the matching state patch sub-second; no event for an
        # uncommitted write. Thin — websocket-fanout already does Redis->WS.
        after: [cdc-pgoutput-translate]

  # ── PHASE 6 ────────────────────────────────────────────────────────────────
  - name: react-dashboard
    goal: >
      A small React + TypeScript dashboard a floor manager exercises live: a
      list of the 50 vehicles with current status + battery, the most recent
      anomaly per vehicle, and per-zone entry counts — all updating live from
      granular WebSocket patches (no full-list re-render, no polling).
    success: >
      On load the dashboard renders the REST snapshot, then applies individual
      WS patches to update only the affected vehicle/zone. A fault or anomaly
      surfaces immediately (not at a poll interval). Per-zone counts tick live.
    proofOfWork:
      kind: llm-judge
      run: docker compose -f docker-compose.test.yml run --rm web npm run test:ui
      pass: >
        Judge confirms: starting from a mounted dashboard seeded with a REST
        snapshot, dispatching a vehicle_state_changed / anomaly_detected /
        zone_count_changed patch updates only the affected vehicle row or zone
        tile (status/battery, latest anomaly, zone count) without a full-list
        re-render or page refresh — asserted via component tests with a mocked
        WS/REST transport (no full backend topology), kept light to fit the
        apply window; judge inspects the rendered DOM/render-count evidence.
    # Decomposed at phase entry (2026-06-16): shell + live vehicle list first
    # (carries the React/TS/Vite scaffold + transport), then anomalies + zone
    # tiles. Proof is component-level with a mocked transport (fast, in-window)
    # rather than a full-stack Playwright run.
    changes:
      - name: dashboard-shell-live-list
        # Root: scaffold React + TypeScript (Vite) under web/; a typed transport
        # that fetches the REST snapshot on load and opens the WebSocket; render
        # the 50-vehicle live list (status + battery), applying granular WS
        # patches so only the changed vehicle row re-renders (no polling).
      - name: dashboard-anomalies-zones
        # Surface the most recent anomaly per vehicle and live per-zone entry
        # count tiles, both updating from anomaly_detected / zone_count_changed
        # WS patches. Lands the phase llm-judge proof.
        after: [dashboard-shell-live-list]
