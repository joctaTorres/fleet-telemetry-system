# Runtime stack: ONE `docker compose up` at the repo root serves the full fleet
# telemetry system for real use — separate from, and leaving untouched, the
# `docker-compose.test.yml` pytest/vitest harness.
#
# Topology (telemetry-architecture standard, reused unchanged):
#   db        Postgres primary, wal_level=logical (physical streaming + the CDC
#             logical slot). Writes land here via the ingestion API.
#   replica   streaming hot standby (pg_basebackup bootstrap). The frontend API
#             serves every REST read and the connect snapshot from here, never
#             the primary.
#   redis     pub/sub broker — the single CDC consumer's only fan-out path.
#   migrate   one-shot `python -m app.migrate`: applies versioned migrations and
#             seeds one zone_counts row per id in app.models.ZONES, then exits.
#             The APIs and CDC depend on it completing successfully.
#   cdc       the singleton `python -m app.cdc_consumer`: tails the primary's
#             pgoutput logical slot and publishes derived events to Redis.
#   ingestion uvicorn serving app.ingestion_api:app (stateless write path).
#   frontend  uvicorn serving app.frontend_api:app (reads from replica + WS).
#   dashboard the built Vite/React/TS app, served on a host port, wired to the
#             frontend API host port via VITE_API_BASE_URL / VITE_WS_URL.
#   k6        grafana/k6 load generator firing on `up` — a stateful 50-vehicle
#             1 Hz fleet driving real load through the served APIs.
#
# Every connection string is read from the environment with no credentials baked
# into application source. The values below are compose-network, single-host
# defaults overridable via the environment; the durable named volumes mean the
# database survives a restart (unlike the test harness's tmpfs).
services:
  db:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleet}
      POSTGRES_DB: ${POSTGRES_DB:-fleet}
    volumes:
      # Adds the `host replication ... trust` pg_hba rule so the replica streams.
      - ./docker/primary-init:/docker-entrypoint-initdb.d:ro
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleet} -d ${POSTGRES_DB:-fleet}"]
      interval: 2s
      timeout: 3s
      retries: 30

  replica:
    image: postgres:16-alpine
    entrypoint: ["/bin/sh", "/replica-entrypoint.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleet}
      PRIMARY_HOST: db
      PRIMARY_PORT: "5432"
    volumes:
      - ./docker/replica-entrypoint.sh:/replica-entrypoint.sh:ro
      - replica-data:/var/lib/postgresql/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleet} -d ${POSTGRES_DB:-fleet}"]
      interval: 2s
      timeout: 3s
      retries: 60

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  # One-shot migrate + zone seed against the primary. Runs to completion and
  # exits 0; the APIs and CDC gate on `service_completed_successfully` so the
  # schema and all 20 realistic zone rows exist before anything serves.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.migrate"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleet}:${POSTGRES_PASSWORD:-fleet}@db:5432/${POSTGRES_DB:-fleet}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  cdc:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.cdc_consumer"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleet}:${POSTGRES_PASSWORD:-fleet}@db:5432/${POSTGRES_DB:-fleet}
      REDIS_URL: redis://redis:6379/0
      # OTLP/HTTP export to Alloy over the compose network. The value comes from
      # compose config only (env-overridable, never from app source); unset it to
      # run the CDC consumer with no exporter and no collector.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      # Start only after the observability backbone is up: Alloy itself gates on
      # Tempo + Prometheus being healthy, so the OTLP front door is reachable.
      alloy:
        condition: service_started

  # The streaming-replication lag probe: a long-lived `python -m
  # app.replication_probe` that samples pg_stat_replication on the primary and
  # the replay position/timestamp on the replica, emitting the lag as the custom
  # OTel gauges `pg_replication_lag_bytes` / `pg_replication_lag_seconds` over
  # the same OTLP/HTTP -> Alloy path. Read-only monitoring queries only; it never
  # writes and never touches the replication slot.
  replication-probe:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.replication_probe"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleet}:${POSTGRES_PASSWORD:-fleet}@db:5432/${POSTGRES_DB:-fleet}
      REPLICA_URL: postgresql://${POSTGRES_USER:-fleet}:${POSTGRES_PASSWORD:-fleet}@replica:5432/${POSTGRES_DB:-fleet}
      # OTLP/HTTP export to Alloy over the compose network. The value comes from
      # compose config only (env-overridable, never from app source); unset it to
      # run the probe with no exporter and no collector.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
    depends_on:
      db:
        condition: service_healthy
      replica:
        condition: service_healthy
      # Start only after the observability backbone is up: Alloy itself gates on
      # Tempo + Prometheus being healthy, so the OTLP front door is reachable.
      alloy:
        condition: service_started

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      ["uvicorn", "app.ingestion_api:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleet}:${POSTGRES_PASSWORD:-fleet}@db:5432/${POSTGRES_DB:-fleet}
      # OTLP/HTTP export to Alloy over the compose network. The value comes from
      # compose config only (env-overridable, never from app source); unset it to
      # run the ingestion app with no exporter and no collector.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
    ports:
      - "${INGESTION_PORT:-8001}:8001"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      # Start only after the observability backbone is up: Alloy itself gates on
      # Tempo + Prometheus being healthy, so the OTLP front door is reachable.
      alloy:
        condition: service_started
    healthcheck:
      # The ingestion app exposes no GET; a 404/405 on / still proves it serves.
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/openapi.json').status==200 else 1)\"",
        ]
      interval: 3s
      timeout: 3s
      retries: 30

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      ["uvicorn", "app.frontend_api:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleet}:${POSTGRES_PASSWORD:-fleet}@db:5432/${POSTGRES_DB:-fleet}
      REPLICA_URL: postgresql://${POSTGRES_USER:-fleet}:${POSTGRES_PASSWORD:-fleet}@replica:5432/${POSTGRES_DB:-fleet}
      REDIS_URL: redis://redis:6379/0
      # OTLP/HTTP export to Alloy over the compose network. The value comes from
      # compose config only (env-overridable, never from app source); unset it to
      # run the frontend app with no exporter and no collector.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
    ports:
      - "${FRONTEND_PORT:-8002}:8002"
    depends_on:
      db:
        condition: service_healthy
      replica:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      # Start only after the observability backbone is up: Alloy itself gates on
      # Tempo + Prometheus being healthy, so the OTLP front door is reachable.
      alloy:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/vehicles').status==200 else 1)\"",
        ]
      interval: 3s
      timeout: 3s
      retries: 30

  # The built dashboard, served on a host port. The build bakes in the frontend
  # API host URL + WS URL via VITE_* build args; no host/port is hard-coded in
  # source. Browser-origin URLs (localhost:<host port>), since the browser, not a
  # compose-network container, reaches the frontend API.
  dashboard:
    build:
      context: ./web
      dockerfile: Dockerfile.runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8002}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8002/ws}
        # Browser-origin OTLP/HTTP traces endpoint: the SPA's @opentelemetry SDK
        # POSTs spans to Alloy's host-published OTLP/HTTP receiver. Baked at build
        # time from compose config only; env-overridable, unset = no-op.
        VITE_OTLP_TRACES_ENDPOINT: ${VITE_OTLP_TRACES_ENDPOINT:-http://localhost:4318/v1/traces}
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      frontend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Observability backbone: Alloy (OTLP front door) -> Tempo (traces) +
  # Prometheus (metrics) -> Grafana (visualization). This change ships only the
  # backbone; datasource/dashboard provisioning and app instrumentation land in
  # the follow-on changes of the ingestion-trace-backbone phase. All host port
  # mappings are environment-overridable, mirroring the existing *_PORT
  # convention; cross-service endpoints resolve over the compose network.
  # ---------------------------------------------------------------------------

  # Grafana Tempo, single-binary mode with local block storage. Its OTLP
  # receivers (4317/4318) accept traces forwarded by Alloy; the HTTP API + ready
  # endpoint on 3200 is exposed for queries and the proof-of-work trace search.
  tempo:
    # Pinned to 2.7.x: the 3.0 image is fully distroless (no shell) so an
    # in-container healthcheck can't run, and 3.0 also dropped the legacy
    # single-binary config keys. 2.7.2 ships busybox (wget) for the healthcheck.
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3200/ready | grep -q ready || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30

  # Prometheus with the remote-write receiver enabled so Alloy can push
  # OTLP-derived metrics; it also scrapes itself and Alloy (see prometheus.yml).
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/ready || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30

  # Grafana Alloy as the single OTLP collector: receives on 4317/4318 and fans
  # traces to Tempo and metrics to Prometheus. The 4318 OTLP/HTTP port and the
  # 12345 UI/metrics port are exposed to the host.
  alloy:
    image: grafana/alloy:v1.5.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "${ALLOY_OTLP_PORT:-4318}:4318"
      - "${ALLOY_UI_PORT:-12345}:12345"
    depends_on:
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      # The Alloy image is Ubuntu-based with bash but no wget/curl, so probe the
      # ready endpoint over bash's /dev/tcp and assert a 200 status line.
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/12345; printf "GET /-/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3; grep -q "200 OK" <&3'
      interval: 3s
      timeout: 3s
      retries: 30

  # Grafana, the visualization surface. Anonymous access (Admin role) is enabled
  # for the local demo; admin/admin is the fallback login. The Tempo + Prometheus
  # datasources and a file-based dashboard provider are provisioned read-only from
  # docker/grafana/ so everything is preloaded on a clean `docker compose up`.
  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30

  # k6 fires on `up` and drives a CONTINUOUS load. Each of 50 VUs owns one vehicle
  # and streams ~1 Hz stateful telemetry through the ingestion API, reading back
  # through the frontend API — the `constant-vus` executor runs for an effectively
  # unbounded duration so the fleet keeps driving for as long as the stack is up.
  # Targets are passed as env (no hard-coded hosts). A breached threshold exits
  # non-zero so a regression surfaces. `restart: unless-stopped` keeps the load
  # generator running (and reconnecting) for the life of the stack.
  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts:ro
    environment:
      INGESTION_BASE_URL: http://ingestion:8001
      FRONTEND_BASE_URL: http://frontend:8002
    command: ["run", "/scripts/fleet-simulation.js"]
    restart: unless-stopped
    depends_on:
      ingestion:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  db-data:
  replica-data:
  redis-data:
  tempo-data:
  prometheus-data:
  grafana-data:
